<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: #f5f5f0; overscroll-behavior: none; overflow-x: hidden; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; overflow-x: hidden; }
  #install-banner { display:none; position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid #e0e0d8; padding:12px 16px; z-index:999; align-items:center; gap:12px; box-shadow:0 -2px 8px rgba(0,0,0,.08); }
  #install-banner .install-icon { width:40px; height:40px; background:#1D9E75; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
  #install-banner .install-text { flex:1; font-size:13px; color:#333; line-height:1.4; }
  #install-banner .install-text strong { display:block; font-size:14px; margin-bottom:2px; }
  #install-banner .install-close { background:none; border:none; font-size:20px; color:#999; cursor:pointer; padding:4px; line-height:1; }
  .top-bar { background: #f5f5f0; border-bottom: 1px solid #e0e0d8; padding: 12px 20px; position: sticky; top: 0; z-index: 100; }
  .top-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  h1 { font-size: 20px; font-weight: 600; color: #1a1a1a; }
  .stats-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .pill { background: transparent; border: none; border-radius: 20px; padding: 4px 0; font-size: 13px; color: #666; }
  .pill strong { color: #1a1a1a; font-weight: 600; }
  .pbar-wrap { height: 6px; background: #e8e8e0; border-radius: 3px; margin-bottom: 10px; overflow: hidden; }
  .pbar-fill { height: 100%; background: #1D9E75; border-radius: 3px; transition: width .3s; }
  .controls { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .controls input { flex: 1; min-width: 160px; padding: 7px 12px; font-size: 13px; border: 1px solid #ccc; border-radius: 8px; background: #fff; color: #1a1a1a; outline: none; }
  .controls input:focus { border-color: #1D9E75; }
  .controls button { padding: 6px 12px; font-size: 12px; border: 1px solid #ccc; border-radius: 8px; background: #fff; color: #444; cursor: pointer; white-space: nowrap; transition: background .1s; }
  .controls button:hover { background: #f0f0ea; }
  .controls button.act { background: #1D9E75; color: #fff; border-color: #1D9E75; }
  .controls button.danger:hover { color: #c0392b; border-color: #c0392b; }
  .main { padding: 16px 20px; max-width: 1200px; margin: 0 auto; }
  .boxes { display: flex; flex-direction: column; gap: 10px; }
  .box-card { background: #fff; border: 1px solid #e0e0d8; border-radius: 12px; overflow: hidden; }
  .box-hdr { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; background: #f8f8f3; border-bottom: 1px solid #e8e8e0; cursor: pointer; user-select: none; }
  .box-hdr:hover { background: #f0f0ea; }
  .box-title { font-size: 13px; font-weight: 600; color: #333; }
  .box-right { display: flex; align-items: center; gap: 10px; }
  .box-count { font-size: 12px; color: #888; }
  .minibar { width: 70px; height: 4px; background: #e0e0d8; border-radius: 2px; overflow: hidden; }
  .minibar-fill { height: 100%; background: #1D9E75; border-radius: 2px; transition: width .3s; }
  .arrow { font-size: 11px; color: #999; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; padding: 8px; }
  .box-card.collapsed .grid { display: none; }
  .cell { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding: 4px 2px; border-radius: 6px; cursor: pointer; transition: background .1s; min-height: 108px; position: relative; border: 1.5px solid transparent; }
  .cell:hover { background: #f5f5f0; }
  .cell.caught { background: rgba(29,158,117,.1); border-color: rgba(29,158,117,.4); }
  /* tick removed — caught state shown by cell highlight only */
  .cell img { width: 80px; height: 80px; object-fit: contain; display: block; transition: filter .15s; }
  .cell img.grey { filter: grayscale(1) opacity(0.3); }
  .cell.caught img { filter: none; }
  .pname { font-size: 9px; color: #888; text-align: center; line-height: 1.2; margin-top: 2px; max-width: 82px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cell.caught .pname { color: #0F6E56; font-weight: 500; }
  .nores { text-align: center; padding: 3rem; color: #999; font-size: 14px; }
  @media (max-width: 500px) {
    .grid { grid-template-columns: repeat(6, 1fr); gap: 1px; }
    .main { padding: 4px; }
    .cell { min-height: 72px; padding: 3px 1px; border-radius: 5px; }
    .cell img { width: 52px; height: 52px; }
    .pname { font-size: 7.5px; max-width: 54px; margin-top: 1px; }
    .cell-info-btn { width: 10px; height: 10px; font-size: 6px; line-height: 10px; }
    .box-card { border-radius: 8px; }
  }
  .tabs { display: flex; gap: 0; border-bottom: 1px solid #e0e0d8; margin-bottom: 0; background: #fff; padding: 0 20px; }
  .tab-btn { padding: 8px 16px; font-size: 13px; font-weight: 500; color: #888; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; margin-bottom: -1px; transition: color .15s; }
  .tab-btn:hover { color: #333; }
  .tab-btn.active { color: #1D9E75; border-bottom-color: #1D9E75; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .swsh-section-wrap { margin-bottom: 8px; }
  .swsh-sec-count { font-size: 11px; font-weight: 500; opacity: .85; }








/* Gear / settings popover */
.gear-wrap { position: relative; }
.gear-btn {
  background: none; border: 1px solid #ccc; border-radius: 8px;
  width: 34px; height: 34px; font-size: 16px; cursor: pointer;
  color: #666; display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
}
.gear-btn:hover { background: #e8e8e0; color: #333; }
.gear-popover {
  display: none; position: absolute; right: 0; top: calc(100% + 6px);
  background: #fff; border: 1px solid #e0e0d8; border-radius: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12); min-width: 160px;
  z-index: 200; overflow: hidden;
  animation: popIn 0.15s cubic-bezier(0.34,1.56,0.64,1);
}
.gear-popover.open { display: block; }
@keyframes popIn {
  from { opacity:0; transform: scale(0.92) translateY(-4px); }
  to   { opacity:1; transform: scale(1)    translateY(0); }
}
.gear-item {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 11px 16px; background: none; border: none;
  font-size: 13px; color: #333; cursor: pointer; text-align: left;
  transition: background 0.1s;
}
.gear-item:hover { background: #f5f5f0; }
.gear-item + .gear-item { border-top: 1px solid #f0f0e8; }
.gear-icon { font-size: 15px; width: 18px; text-align: center; }


/* Completed box header */
.box-hdr.complete {
  background: linear-gradient(135deg, #1a7a5e 0%, #1D9E75 100%);
  border-bottom-color: #178a63;
}
.box-hdr.complete .box-title { color: #fff; }
.box-hdr.complete .box-count { color: rgba(255,255,255,0.85); }
.box-hdr.complete .arrow      { color: rgba(255,255,255,0.7); }
.box-hdr.complete .minibar    { background: rgba(255,255,255,0.25); }
.box-hdr.complete .minibar-fill { background: #fff; }

/* Completed SwSh section header — slightly richer green */

/* ===== Info Panel ===== */
#info-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  z-index: 900; backdrop-filter: blur(2px);
  animation: fadeIn 0.18s ease;
}
#info-panel {
  position: fixed; top: 0; right: -100vw; width: min(360px, 100vw); height: 100dvh;
  background: #1a1f2e; border-left: 1px solid #2d3550;
  z-index: 901; transition: right 0.28s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column; overflow: hidden;
  box-shadow: -8px 0 32px rgba(0,0,0,0.5);
}
#info-panel.open { right: 0; }
#info-panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 12px; background: #151929;
  border-bottom: 1px solid #2d3550; flex-shrink: 0;
}
#info-pokemon-name {
  font-size: 1.1rem; font-weight: 700; color: #e8eaf6; letter-spacing: 0.02em;
}
#info-close {
  background: none; border: none; color: #8891b4; font-size: 1.1rem;
  cursor: pointer; padding: 4px 6px; border-radius: 6px; line-height:1;
  transition: color 0.15s, background 0.15s;
}
#info-close:hover { color: #e8eaf6; background: #2d3550; }
#info-panel-body { flex: 1; overflow-y: auto; padding: 16px; }
#info-sprite-wrap {
  display: flex; justify-content: center; margin-bottom: 14px;
}
#info-sprite {
  width: 96px; height: 96px; object-fit: contain;
  image-rendering: pixelated; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
}
#info-loading {
  display: flex; align-items: center; gap: 10px;
  color: #8891b4; font-size: 0.88rem; padding: 12px 0;
}
.info-spinner {
  width: 16px; height: 16px; border: 2px solid #2d3550;
  border-top-color: #5c7cfa; border-radius: 50%;
  animation: spin 0.7s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
#info-result { color: #c5cae9; font-size: 0.86rem; line-height: 1.55; }
.info-section { margin-bottom: 14px; }
.info-section-title {
  font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: #5c7cfa; margin-bottom: 7px;
}
.evo-chain {
  display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
}
.evo-step {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.evo-step img {
  width: 52px; height: 52px; object-fit: contain; image-rendering: pixelated;
  filter: drop-shadow(0 1px 4px rgba(0,0,0,0.35));
}
.evo-step span {
  font-size: 0.72rem; color: #8891b4; text-align: center;
  max-width: 60px; line-height: 1.2;
}
.evo-step span.evo-name { color: #c5cae9; font-weight: 600; }
.evo-arrow {
  color: #3d4a7a; font-size: 1.1rem;
}
.evo-arrow-wrap {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 2px; align-self: center;
}
.evo-condition {
  font-size: 0.65rem; color: #6b7db3; text-align: center;
  max-width: 64px; line-height: 1.2; font-style: italic;
}
.location-list { list-style: none; padding: 0; margin: 0; }
.location-list li {
  padding: 5px 0; border-bottom: 1px solid #1e2538; font-size: 0.83rem; color: #9aa3cc;
}
.location-list li:last-child { border-bottom: none; }

/* Location rows */
.loc-row { display:flex; align-items:flex-start; gap:8px; margin-bottom:5px; }
.loc-row:last-child { margin-bottom:0; }
.loc-game {
  flex-shrink:0; font-size:0.65rem; font-weight:700; padding:2px 6px;
  border-radius:4px; color:#fff; margin-top:1px; letter-spacing:0.03em;
}
.loc-sv   { background:#c0392b; }
.loc-swsh { background:#2471a3; }
.loc-sm   { background:#1a8a4a; }
.loc-text { color:#9aa3cc; font-size:0.83rem; line-height:1.5; }

/* loc-row-db handled by grid */
.loc-table { display:grid; grid-template-columns: max-content 1fr; gap:0; }
.loc-row-db { display:contents; }
.loc-row-db > * { padding:5px 0; border-bottom:1px solid #1e2538; }
.loc-row-db:last-child > * { border-bottom:none; }
.loc-game-label { font-size:0.72rem; font-weight:700; line-height:1.4; padding-right:14px; white-space:nowrap; }


.location-list li strong { color: #c5cae9; }
.info-error { color: #ef9a9a; font-size: 0.84rem; padding: 8px 0; }
.info-pokemondb-link {
  display: inline-flex; align-items: center; gap: 5px;
  color: #5c7cfa; font-size: 0.8rem; text-decoration: none;
  margin-top: 10px; padding: 5px 10px; border: 1px solid #2d3550;
  border-radius: 6px; transition: background 0.15s;
}
.info-pokemondb-link:hover { background: #1e2538; }

/* Info button on cells */
.cell { position: relative; }
.cell-info-btn {
  position: absolute; top: 3px; right: 3px;
  width: 12px; height: 12px; border-radius: 50%;
  background: rgba(255,255,255,0.75); border: 1px solid rgba(0,0,0,0.12);
  color: #999; font-size: 8px; font-weight: 700; font-style: italic;
  line-height: 12px; text-align: center; cursor: pointer;
  opacity: 0; transition: opacity 0.15s; z-index: 3;
  font-family: Georgia, serif;
  -webkit-user-select: none; user-select: none;
}
.cell:hover .cell-info-btn { opacity: 1; }
.cell-info-btn:hover { background: #e8eaf6; border-color: #5c7cfa; color: #5c7cfa; }
/* Touch devices — small subtle dot, top-right corner above sprite */
@media (pointer: coarse) {
  .cell-info-btn { opacity: 0.35; width: 11px; height: 11px; font-size: 7px; line-height: 11px; }
}

/* Responsive panel */
/* panel width handled by min(360px,100vw) */

</style>
</head>

const BASE = "https://img.pokemondb.net/sprites/home/normal/";
const SK = "livingdex_pdb_v1";
let caught = {};
try { caught = JSON.parse(localStorage.getItem(SK) || "{}"); } catch(e) {}
function save() { try { localStorage.setItem(SK, JSON.stringify(caught)); } catch(e) {} }

let fm = "all", col = {};
function setCol(v) { BD.forEach(b => col[b.n] = v); render(); }
function clearAll() {
  if (confirm("Reset all caught Pokémon? This cannot be undone.")) {
    caught = {}; save(); render();
  }
}

function toggle(id) {
  caught[id] = !caught[id];
  if (!caught[id]) delete caught[id];
  save();
  const cell = document.getElementById(id);
  if (!cell) return;
  const isCaught = !!caught[id];
  cell.className = "cell" + (isCaught ? " caught" : "");
  const img = cell.querySelector("img");
  if (img) img.className = isCaught ? "" : "grey";
  updateStats();
  // update box count
  const boxN = id.split("_")[0].slice(1);
  updateBoxCount(parseInt(boxN));
}

function updateBoxCount(n) {
  const box = BD.find(b => b.n === n);
  if (!box) return;
  const bc = box.p.filter(([name]) => !!caught["b"+n+"_"+name]).length;
  const el = document.getElementById("bc_"+n);
  const bar = document.getElementById("bb_"+n);
  if (el) el.textContent = bc + "/" + box.p.length;
  if (bar) bar.style.width = Math.round(bc/box.p.length*100) + "%";
  // Update complete styling on box header
  const hdrEl = el ? el.closest('.box-hdr') : null;
  if (hdrEl) hdrEl.className = 'box-hdr' + (bc === box.p.length ? ' complete' : '');
}

function updateStats() {
  const total = BD.reduce((s,b) => s + b.p.length, 0);
  const n = Object.keys(caught).length;
  document.getElementById("cc").textContent = n;
  document.getElementById("tc").textContent = total;
  const p = total > 0 ? Math.round(n/total*100) : 0;
  document.getElementById("pct").textContent = p + "%";
  document.getElementById("mbar").style.width = p + "%";
}

function render() {
  const q = document.getElementById("srch").value.toLowerCase();

  updateStats();
  const container = document.getElementById("boxes");
  container.innerHTML = "";
  let any = false;

  BD.forEach(box => {
    const filtered = box.p.filter(([name]) => {
      const id = "b"+box.n+"_"+name;
      if (fm==="cat" && !caught[id]) return false;
      if (fm==="unc" && caught[id]) return false;
      if (q && !name.toLowerCase().includes(q)) return false;
      return true;
    });
    if (!filtered.length) return;
    any = true;

    const bc = box.p.filter(([name]) => !!caught["b"+box.n+"_"+name]).length;
    const card = document.createElement("div");
    card.className = "box-card" + (col[box.n] ? " collapsed" : "");

    const hdr = document.createElement("div");
    hdr.className = "box-hdr" + (bc === box.p.length ? " complete" : "");
    hdr.innerHTML = `
      <span class="box-title">Box ${box.n}</span>
      <div class="box-right">
        <span class="box-count" id="bc_${box.n}">${bc}/${box.p.length}</span>
        <div class="minibar"><div class="minibar-fill" id="bb_${box.n}" style="width:${Math.round(bc/box.p.length*100)}%"></div></div>
        <span class="arrow">${col[box.n] ? "▸" : "▾"}</span>
      </div>`;
    hdr.onclick = () => {
      col[box.n] = !col[box.n];
      card.className = "box-card" + (col[box.n] ? " collapsed" : "");
      hdr.querySelector(".arrow").textContent = col[box.n] ? "▸" : "▾";
    };
    card.appendChild(hdr);

    const grid = document.createElement("div");
    grid.className = "grid";

    filtered.forEach(([name, slug]) => {
      const id = "b"+box.n+"_"+name;
      grid.appendChild(makeCell(name, slug, !!caught[id], () => toggle(id), id));
    });

    card.appendChild(grid);
    container.appendChild(card);
  });

  if (!any) {
    container.innerHTML = `<div class="nores">No Pokémon found matching your search.</div>`;
  }
}

let infoPanelOpen = false;
let infoPanelLockScroll = false;
let longPressTimer = null;

function openInfoPanel(name, slug) {
  document.getElementById('info-panel').classList.add('open');
  document.getElementById('info-overlay').style.display = 'block';
  document.getElementById('info-pokemon-name').textContent = name;
  document.getElementById('info-sprite').src = getImgSrc(slug);
  document.getElementById('info-loading').style.display = 'flex';
  document.getElementById('info-result').style.display = 'none';
  document.getElementById('info-result').innerHTML = '';
  infoPanelOpen = true;
  fetchPokemonInfo(name, slug);
}

function closeInfoPanel() {
  document.getElementById('info-panel').classList.remove('open');
  document.getElementById('info-overlay').style.display = 'none';
  infoPanelOpen = false;
}

async function fetchPokemonInfo(name, slug) {
  // Derive PokeAPI-compatible name from our slug
  // Strip form suffixes to get the base species
  let apiName = slug
    .replace(/-(gigantamax|gmax)$/i, '')
    .replace(/-(m)$/, '-male')
    .replace(/-(f)$/, '-female')
    .toLowerCase();

  // Galarian/Alolan forms use suffix format in PokeAPI
  // e.g. "meowth-galarian", "slowpoke-galarian", "articuno-galar"
  // Our slugs already have these so mostly fine, but some need tweaking
  const formMap = {
    'galarian-slowpoke': 'slowpoke-galar',
    'galarian-slowbro': 'slowbro-galar',
    'galarian-slowking': 'slowking-galar',
    'galarian-mr-mime': 'mr-mime-galar',
    'galarian-farfetchd': 'farfetchd-galar',
    'galarian-weezing': 'weezing-galar',
    'galarian-corsola': 'corsola-galar',
    'galarian-zigzagoon': 'zigzagoon-galar',
    'galarian-linoone': 'linoone-galar',
    'galarian-darumaka': 'darumaka-galar',
    'galarian-darmanitan': 'darmanitan-galar-standard',
    'galarian-ponyta': 'ponyta-galar',
    'galarian-rapidash': 'rapidash-galar',
    'galarian-yamask': 'yamask-galar',
    'galarian-stunfisk': 'stunfisk-galar',
    'galarian-articuno': 'articuno-galar',
    'galarian-zapdos': 'zapdos-galar',
    'galarian-moltres': 'moltres-galar',
  };
  if (formMap[apiName]) apiName = formMap[apiName];

  // Species name (without form suffix) for the species endpoint
  const speciesName = apiName
    .replace(/-(galar|alola|hisui|paldea|male|female|standard|zen|hero|single-strike|rapid-strike|ice|noice|confined|unbound|original|resolute|ordinary|pirouette|aria|blade|shield|crowned|eternamax).*$/, '');

  const pokeUrl = 'https://pokemondb.net/pokedex/' + speciesName.replace('♀','-f').replace('♂','-m');
  const POKEAPI = 'https://pokeapi.co/api/v2/';

  // Check sessionStorage cache first
  const cacheKey = 'pkinfo_' + speciesName;
  try {
    const cached = sessionStorage.getItem(cacheKey);
    if (cached) {
      const {pokemon: pd, species: sd, evo: ed} = JSON.parse(cached);
      renderInfoFromPokeAPI(pd, sd, ed, name, pokeUrl, speciesName);
      return;
    }
  } catch {}

  try {
    // Fetch pokemon data (types, game indices) and species (evo chain url) in parallel
    const [pokeResp, speciesResp] = await Promise.all([
      fetch(POKEAPI + 'pokemon/' + apiName),
      fetch(POKEAPI + 'pokemon-species/' + speciesName),
    ]);

    if (!pokeResp.ok || !speciesResp.ok) {
      // Try without form suffix as fallback
      const fallbackResp = await fetch(POKEAPI + 'pokemon/' + speciesName);
      if (!fallbackResp.ok) throw new Error('Not found in PokeAPI');
    }

    const [pokeData, speciesData] = await Promise.all([
      pokeResp.ok ? pokeResp.json() : fetch(POKEAPI + 'pokemon/' + speciesName).then(r => r.json()),
      speciesResp.json(),
    ]);

    // Fetch evolution chain
    const evoUrl = speciesData.evolution_chain?.url;
    const evoData = evoUrl ? await fetch(evoUrl).then(r => r.json()) : null;

    // Fetch SwSh encounter locations
    // Cache for this session
    try {
      sessionStorage.setItem(cacheKey, JSON.stringify({
        pokemon: {name: pokeData.name, types: pokeData.types, stats: pokeData.stats, game_indices: pokeData.game_indices},
        species: {evolution_chain: speciesData.evolution_chain},
        evo: evoData
      }));
    } catch {}
    renderInfoFromPokeAPI(pokeData, speciesData, evoData, name, pokeUrl, speciesName);

  } catch (err) {
    document.getElementById('info-loading').style.display = 'none';
    document.getElementById('info-result').style.display = 'block';
    document.getElementById('info-result').innerHTML =
      `<div class="info-section">
        <div class="info-section-title">Info</div>
        <p style="color:#9aa3cc;font-size:0.83rem;margin:0 0 12px">Could not load data (${err.message}).</p>
        <a class="info-pokemondb-link" href="${pokeUrl}" target="_blank">Open on PokémonDB ↗</a>
      </div>`;
  }
}

function formatEvoCondition(details) {
  // Takes an evolution_details object and returns a human-readable condition string
  if (!details) return '';
  const parts = [];
  const d = details;
  const fmt = s => s.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());

  if (d.trigger?.name === 'level-up') {
    if (d.min_level) parts.push('Lv. ' + d.min_level);
    else if (d.min_happiness) parts.push('High Friendship');
    else if (d.min_affection) parts.push('High Affection');
    else if (d.known_move) parts.push('Know ' + fmt(d.known_move.name));
    else if (d.known_move_type) parts.push('Know ' + fmt(d.known_move_type.name) + '-type move');
    else if (d.location) parts.push('At ' + fmt(d.location.name));
    else if (d.time_of_day === 'day') parts.push('Daytime');
    else if (d.time_of_day === 'night') parts.push('Nighttime');
    else if (d.needs_overworld_rain) parts.push('While raining');
    else parts.push('Level up');
  } else if (d.trigger?.name === 'use-item') {
    if (d.item) parts.push(fmt(d.item.name));
  } else if (d.trigger?.name === 'trade') {
    if (d.held_item) parts.push('Trade holding ' + fmt(d.held_item.name));
    else if (d.trade_species) parts.push('Trade for ' + fmt(d.trade_species.name));
    else parts.push('Trade');
  } else if (d.trigger?.name === 'shed') {
    parts.push('Level 20 + empty slot');
  } else if (d.trigger?.name === 'spin') {
    parts.push('Spin + Affection');
  } else if (d.trigger?.name === 'tower-of-darkness') {
    parts.push('Tower of Darkness');
  } else if (d.trigger?.name === 'tower-of-waters') {
    parts.push('Tower of Waters');
  } else if (d.trigger?.name === 'three-critical-hits') {
    parts.push('3 critical hits in one battle');
  } else if (d.trigger?.name === 'take-damage') {
    parts.push('After taking damage');
  } else if (d.trigger) {
    parts.push(fmt(d.trigger.name));
  }

  // Extra conditions
  if (d.held_item && d.trigger?.name !== 'trade') parts.push('holding ' + fmt(d.held_item.name));
  if (d.gender === 1) parts.push('♀ only');
  if (d.gender === 2) parts.push('♂ only');
  if (d.relative_physical_stats === 1) parts.push('Atk > Def');
  if (d.relative_physical_stats === -1) parts.push('Def > Atk');
  if (d.relative_physical_stats === 0) parts.push('Atk = Def');
  if (d.party_type) parts.push(fmt(d.party_type.name) + '-type in party');
  if (d.party_species) parts.push(fmt(d.party_species.name) + ' in party');
  if (d.turn_upside_down) parts.push('Hold upside down');

  return parts.join(', ');
}

function flattenEvoChain(chain) {
  // Returns flat array of {name, details} where details is the evolution_details to reach this stage
  const results = [];
  function walk(node, incomingDetails) {
    if (!node) return;
    results.push({ name: node.species.name, details: incomingDetails || null });
    node.evolves_to.forEach(child => walk(child, child.evolution_details?.[0] || null));
  }
  walk(chain, null);
  return results;
}

function renderInfoFromPokeAPI(pokemon, species, evoData, displayName, pokeUrl, speciesName) {
  document.getElementById('info-loading').style.display = 'none';
  const result = document.getElementById('info-result');
  result.style.display = 'block';

  let html = '';

  // ── Evolution chain with conditions ───────────────────
  if (evoData?.chain) {
    const evoSteps = flattenEvoChain(evoData.chain);
    html += `<div class="info-section">
      <div class="info-section-title">Evolution</div>
      <div class="evo-chain">`;

    evoSteps.forEach((step, i) => {
      const displayEvoName = step.name.split('-')
        .map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
      const condition = step.details ? formatEvoCondition(step.details) : null;

      if (i > 0) {
        html += `<div class="evo-arrow-wrap">
          <div class="evo-arrow">→</div>
          ${condition ? `<div class="evo-condition">${condition}</div>` : ''}
        </div>`;
      }
      html += `<div class="evo-step">
        <img src="https://img.pokemondb.net/sprites/home/normal/${step.name}.png"
             onerror="this.onerror=null;this.src='https://img.pokemondb.net/sprites/home/normal/${step.name}-male.png'"
             alt="${displayEvoName}">
        <span class="evo-name">${displayEvoName}</span>
      </div>`;
    });

    html += `</div></div>`;
  }

  // ── Locations (ALL_LOCATIONS static table) ─────────
  const lookupKey = speciesName.toLowerCase();
  const baseKey = lookupKey.replace(/-(galar|alola|hisui|paldea)$/, '');
  const locData = ALL_LOCATIONS[lookupKey] || ALL_LOCATIONS[baseKey] || null;

  html += `<div class="info-section">
    <div class="info-section-title">Where to Find</div>`;
  if (locData && Object.keys(locData).length) {
    const gameOrder = ['SM','USUM','LGPE','SwSh','BDSP','LA','SV','LZA'];
    const shown = gameOrder.filter(g => locData[g]);
    if (shown.length) {
      html += '<div class="loc-table">';
      shown.forEach(g => {
        const cfg = GAME_CONFIG[g] || {label: g, color: '#8891b4'};
        html += `<div class="loc-row-db">
          <span class="loc-game-label" style="color:${cfg.color}">${cfg.label}</span>
          <span class="loc-text">${locData[g]}</span>
        </div>`;
      });
      html += '</div>';
    } else {
      html += `<p style="color:#9aa3cc;font-size:0.83rem;margin:0">No location data available.</p>`;
    }
  } else {
    html += `<p style="color:#9aa3cc;font-size:0.83rem;margin:0">No location data available.</p>`;
  }
  html += '</div>';

  html += `<a class="info-pokemondb-link" href="${pokeUrl}" target="_blank">Full entry on PokémonDB ↗</a>`;
  result.innerHTML = html;
}




function addInfoBtn(cell, name, slug) {
  const btn = document.createElement('div');
  btn.className = 'cell-info-btn';
  btn.textContent = 'i';
  btn.title = 'Info';

  // Click (desktop)
  btn.addEventListener('click', e => {
    e.stopPropagation();
    openInfoPanel(name, slug);
  });

  // Long press (iOS/touch)
  btn.addEventListener('touchstart', e => {
    longPressTimer = setTimeout(() => {
      e.preventDefault();
      openInfoPanel(name, slug);
    }, 500);
  }, { passive: true });
  btn.addEventListener('touchend', () => clearTimeout(longPressTimer));
  btn.addEventListener('touchmove', () => clearTimeout(longPressTimer));

  cell.appendChild(btn);
}

</script>

<script>
function exportData() {
  const data = localStorage.getItem('livingdex_pdb_v1') || '{}';
  const count = Object.keys(JSON.parse(data)).length;
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'livingdex-progress.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        const count = Object.keys(data).length;
        if (confirm(`Import ${count} caught Pokémon? This will replace your current progress.`)) {
          localStorage.setItem('livingdex_pdb_v1', JSON.stringify(data));
          caught = data;
          render();
          alert(`Imported ${count} caught Pokémon successfully!`);
        }
      } catch(err) {
        alert('Invalid file. Please select a valid LivingDex export file.');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// Register service worker for offline support
// Show iOS install banner
function isIos() {
  return /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
}
function isInStandaloneMode() {
  return ('standalone' in window.navigator) && window.navigator.standalone;
}
function dismissBanner() {
  document.getElementById('install-banner').style.display = 'none';
  localStorage.setItem('install-banner-dismissed', '1');
}
if (isIos() && !isInStandaloneMode() && !localStorage.getItem('install-banner-dismissed')) {
  document.getElementById('install-banner').style.display = 'flex';
}

if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'livingdex-v1';
    const ASSETS = [location.href];
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });
  `;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
</script>


<script>



// ===== SwSh Tab =====
const SWSH_KEY = 'swshdex_v1';
let swshCaught = JSON.parse(localStorage.getItem(SWSH_KEY) || '{}');
let swshCol = {};  // collapsed state per box num
function saveSwSh() { localStorage.setItem(SWSH_KEY, JSON.stringify(swshCaught)); }

let activeTab = 'dex';

function showTab(id) {
  activeTab = id;
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.getAttribute('onclick').includes("'" + id + "'")) b.classList.add('active');
  });
  if (id === 'swsh') renderSwSh();
  else if (id === 'dex') render();
}

function getImgSrc(slug) {
  const specialUrls = {
    'floette-eternal': 'https://img.pokemondb.net/sprites/ultra-sun-ultra-moon/normal/floette-eternal.png',
    'meowstic-m': 'https://img.pokemondb.net/sprites/home/normal/meowstic-male.png',
    'meowstic-f': 'https://img.pokemondb.net/sprites/home/normal/meowstic-female.png',
    'indeedee-m': 'https://img.pokemondb.net/sprites/home/normal/indeedee-male.png',
    'indeedee-f': 'https://img.pokemondb.net/sprites/home/normal/indeedee-female.png',
    'oinkologne-f': 'https://img.pokemondb.net/sprites/home/normal/oinkologne-female.png',
    'basculegion-f': 'https://img.pokemondb.net/sprites/home/normal/basculegion-female.png',
  };
  if (specialUrls[slug]) return specialUrls[slug];
  if (slug === 'unown' || slug.startsWith('unown-')) {
    const unownSlug = slug === 'unown' ? 'unown-a' : slug;
    return 'https://img.pokemondb.net/sprites/brilliant-diamond-shining-pearl/normal/' + unownSlug + '.png';
  }
  return BASE + slug + '.png';
}

function makeCell(name, slug, isCaught, onClickFn, cellId) {
  const cell = document.createElement('div');
  cell.className = 'cell' + (isCaught ? ' caught' : '');
  cell.title = name;
  if (cellId) cell.id = cellId;
  cell.onclick = onClickFn;
  const img = document.createElement('img');
  img.src = getImgSrc(slug);
  img.alt = name;
  img.className = isCaught ? '' : 'grey';
  img.onerror = function() {
    const fallbackMap = {
      'darmanitan-galarian-standard': 'darmanitan-galarian',
      'squawkabilly-green': 'squawkabilly', 'squawkabilly-blue': 'squawkabilly',
      'squawkabilly-yellow': 'squawkabilly', 'squawkabilly-white': 'squawkabilly',
      'furfrou-debutante': 'furfrou-deputante', 'mimikyu': 'mimikyu-disguised',
    };
    if (slug === 'unown-exclamation' && this.src.includes('unown-exclamation.png')) {
      this.src = 'https://img.pokemondb.net/sprites/brilliant-diamond-shining-pearl/normal/unown-em.png'; return;
    }
    if (slug === 'unown-question' && this.src.includes('unown-question.png')) {
      this.src = 'https://img.pokemondb.net/sprites/brilliant-diamond-shining-pearl/normal/unown-qm.png'; return;
    }
    if (fallbackMap[slug] && !this.src.includes(fallbackMap[slug])) {
      this.src = BASE + fallbackMap[slug] + '.png'; return;
    }
    this.style.opacity = '0.2';
    this.src = BASE + 'bulbasaur.png';
    this.onerror = null;
  };
  cell.appendChild(img);
  const lbl = document.createElement('div');
  lbl.className = 'pname';
  lbl.textContent = name;
  cell.appendChild(lbl);
  addInfoBtn(cell, name, slug);
  return cell;
}

function renderSwSh() {const q = document.getElementById('srch').value.toLowerCase();
  const container = document.getElementById('swsh-boxes');
  container.innerHTML = '';

  let currentSection = null;
  let sectionWrapper = null;

  SWSH_BOXES.forEach(box => {
    // Filter entries
    const filtered = box.p.filter(([name]) => {
      const id = 'sw' + box.n + '_' + name;
      if (fm === 'cat' && !swshCaught[id]) return false;
      if (fm === 'unc' && swshCaught[id]) return false;
      if (q && !name.toLowerCase().includes(q)) return false;
      return true;
    });
    if (!filtered.length) return;

    // Section header when section changes
    if (box.sk !== currentSection) {
      currentSection = box.sk;
      sectionWrapper = document.createElement('div');
      sectionWrapper.className = 'swsh-section-wrap';
      container.appendChild(sectionWrapper);
    }

    // Box card (same structure as HOME)
    const bc = box.p.filter(([n]) => !!swshCaught['sw' + box.n + '_' + n]).length;
    const card = document.createElement('div');
    card.className = 'box-card' + (swshCol[box.n] ? ' collapsed' : '');

    const hdr = document.createElement('div');
    hdr.className = 'box-hdr' + (bc === box.p.length ? ' complete' : '');
    hdr.id = 'swsh-box-hdr-' + box.n;
    // Get section label prefix for box title
    const secLabel = SWSH_SECTION_LABELS[box.sk];
    const boxNumInSection = box.n - Math.min(...SWSH_BOXES.filter(b => b.sk === box.sk).map(b => b.n)) + 1;
    hdr.innerHTML = `
      <span class="box-title">${secLabel} — Box ${boxNumInSection}</span>
      <div class="box-right">
        <span class="box-count">${bc}/${box.p.length}</span>
        <div class="minibar"><div class="minibar-fill" style="width:${Math.round(bc/box.p.length*100)}%"></div></div>
        <span class="arrow">${swshCol[box.n] ? '▸' : '▾'}</span>
      </div>`;
    hdr.onclick = () => {
      swshCol[box.n] = !swshCol[box.n];
      card.className = 'box-card' + (swshCol[box.n] ? ' collapsed' : '');
      hdr.querySelector('.arrow').textContent = swshCol[box.n] ? '▸' : '▾';
    };
    card.appendChild(hdr);

    const grid = document.createElement('div');
    grid.className = 'grid';
    filtered.forEach(([name, slug]) => {
      const id = 'sw' + box.n + '_' + name;
      grid.appendChild(makeCell(name, slug, !!swshCaught[id], () => toggleSwSh(id), id));
    });
    card.appendChild(grid);
    (sectionWrapper || container).appendChild(card);
  });

  updateSwShSectionCounts();
}

function toggleSwSh(id) {
  swshCaught[id] = !swshCaught[id];
  if (!swshCaught[id]) delete swshCaught[id];
  saveSwSh();
  const cell = document.getElementById(id);
  if (cell) {
    const isCaught = !!swshCaught[id];
    cell.className = 'cell' + (isCaught ? ' caught' : '');
    const img = cell.querySelector('img');
    if (img) img.className = isCaught ? '' : 'grey';
  }
  updateSwShSectionCounts();
}

function updateSwShSectionCounts() {
  // Update each individual box header — count, minibar, complete styling
  SWSH_BOXES.forEach(box => {
    const hdr = document.getElementById('swsh-box-hdr-' + box.n);
    if (!hdr) return;
    const bc = box.p.filter(([n]) => !!swshCaught['sw' + box.n + '_' + n]).length;
    const total = box.p.length;
    const countSpan = hdr.querySelector('.box-count');
    const minibar = hdr.querySelector('.minibar-fill');
    if (countSpan) countSpan.textContent = bc + '/' + total;
    if (minibar) minibar.style.width = Math.round(bc / total * 100) + '%';
    hdr.className = 'box-hdr' + (bc === total ? ' complete' : '');
  });

  // Update section headers — count text and complete styling
  Object.keys(SWSH_SECTION_LABELS).forEach(sk => {
    const el = document.getElementById('swsh-sec-' + sk);
    if (!el) return;
    const boxes = SWSH_BOXES.filter(b => b.sk === sk);
    const total = boxes.reduce((a, b) => a + b.p.length, 0);
    const caught = boxes.reduce((a, b) => a + b.p.filter(([n]) => swshCaught['sw' + b.n + '_' + n]).length, 0);
    el.querySelector('.swsh-sec-count').textContent = caught + '/' + total;
    if (caught === total) el.classList.add('complete-section');
    else el.classList.remove('complete-section');
  });
  // Update overall stats bar when swsh is active
  if (activeTab === 'swsh') {
    const total = SWSH_BOXES.reduce((a, b) => a + b.p.length, 0);
    const caught = SWSH_BOXES.reduce((a, b) => a + b.p.filter(([n]) => swshCaught['sw' + b.n + '_' + n]).length, 0);
    document.getElementById('cc').textContent = caught;
    document.getElementById('tc').textContent = total;
    const pct = total ? Math.round(caught/total*100) : 0;
    document.getElementById('pct').textContent = pct + '%';
    document.getElementById('mbar').style.width = pct + '%';
  }
}


function toggleGear(e) {
  e.stopPropagation();
  document.getElementById('gear-popover').classList.toggle('open');
}
function closeGear() {
  document.getElementById('gear-popover').classList.remove('open');
}
// Close popover when clicking anywhere else
document.addEventListener('click', () => closeGear());

// Initial render
render();
</script>
