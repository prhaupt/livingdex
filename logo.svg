<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7059B8"/>
      <stop offset="100%" stop-color="#C49ED8"/>
    </linearGradient>
    <linearGradient id="door" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5A48A0"/>
      <stop offset="100%" stop-color="#A87EC8"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle inner glow overlay -->
  <rect width="512" height="512" rx="108" fill="white" opacity="0.06"/>

  <!-- House body -->
  <rect x="158" y="284" width="196" height="142" rx="8" fill="white" opacity="0.93"/>

  <!-- Roof -->
  <polygon points="256,124 128,284 384,284" fill="white" opacity="0.93"/>

  <!-- Chimney -->
  <rect x="304" y="172" width="32" height="78" rx="4" fill="white" opacity="0.93"/>

  <!-- Door (arch) -->
  <rect x="229" y="338" width="54" height="88" rx="27" fill="url(#door)" opacity="0.5"/>

  <!-- Left window -->
  <rect x="178" y="312" width="44" height="40" rx="6" fill="url(#door)" opacity="0.4"/>
  <!-- Right window -->
  <rect x="290" y="312" width="44" height="40" rx="6" fill="url(#door)" opacity="0.4"/>

  <!-- Main sparkle star above chimney -->
  <path d="M256,68 L261,84 L278,89 L261,94 L256,110 L251,94 L234,89 L251,84 Z" fill="white" opacity="0.95"/>

  <!-- Tiny sparkle top right -->
  <path d="M352,90 L354.5,97 L362,99.5 L354.5,102 L352,109 L349.5,102 L342,99.5 L349.5,97 Z" fill="white" opacity="0.7"/>

  <!-- Tiny sparkle left -->
  <path d="M148,148 L150,154 L156,156 L150,158 L148,164 L146,158 L140,156 L146,154 Z" fill="white" opacity="0.55"/>
</svg>
